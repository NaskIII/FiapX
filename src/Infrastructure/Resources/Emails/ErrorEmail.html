<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
</head>
<body style="font-family: Arial, sans-serif; color: #333;">
    <h2>Hello {{Username}},</h2>
    <p>We encountered an error while processing your video batch <strong>{{BatchId}}</strong>.</p>

    <p>Please try uploading your videos again or contact our support team.</p>

</html>
