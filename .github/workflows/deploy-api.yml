name: Build e Deploy Azure Functions

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - '.github/workflows/**'

env:
  DOTNET_VERSION: 8.0.x
  CONFIGURATION: Release

  API_PROJECT: src/API/FiapX.API.csproj
  WORKER_PROJECT: src/Worker/FiapX.Worker.csproj

  API_PUBLISH_PATH: publish-api
  WORKER_PUBLISH_PATH: publish-worker

  API_FUNCTIONAPP_NAME: func-fiapx-api
  WORKER_FUNCTIONAPP_NAME: func-fiapx-worker

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration ${{ env.CONFIGURATION }} --no-restore

      - name: Publish API
        run: dotnet publish ${{ env.API_PROJECT }} --configuration ${{ env.CONFIGURATION }} --no-build --output ${{ env.API_PUBLISH_PATH }}

      - name: Publish Worker
        run: dotnet publish ${{ env.WORKER_PROJECT }} --configuration ${{ env.CONFIGURATION }} --no-build --output ${{ env.WORKER_PUBLISH_PATH }}

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-function
          path: ${{ env.API_PUBLISH_PATH }}

      - name: Upload Worker artifact
        uses: actions/upload-artifact@v4
        with:
          name: worker-function
          path: ${{ env.WORKER_PUBLISH_PATH }}

  deploy-api:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download API artifact
        uses: actions/download-artifact@v4
        with:
          name: api-function
          path: publish-api

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy API
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.API_FUNCTIONAPP_NAME }}
          package: publish-api

  deploy-worker:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download Worker artifact
        uses: actions/download-artifact@v4
        with:
          name: worker-function
          path: publish-worker

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Worker
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.WORKER_FUNCTIONAPP_NAME }}
          package: publish-worker